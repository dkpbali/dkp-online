<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Redirecting... - ARUNIWAVES</title>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get("id");
    if (id) {
      window.location.replace("index.html?id=" + encodeURIComponent(id));
    } else {
      window.location.replace("index.html");
    }
  </script>
</head>
<body>
  <div style="font-family: sans-serif; text-align: center; margin-top: 50px; color: #64748b;">
    <p>Mengalihkan ke halaman inventaris aset...</p>
  </div>
</body>
</html>
